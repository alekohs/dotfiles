---
gui:
  nerdFontsVersion: "3"
  showIcons: true

  theme:
    activeBorderColor:
      - "#f6c177"
      - bold
    inactiveBorderColor:
      - "#403d52"
    optionsTextColor:
      - "#e0def4"
    selectedLineBgColor:
      - "#26233a"
    cherryPickedCommitBgColor:
      - "#1f1d2e"
    cherryPickedCommitFgColor:
      - "#ebbcba"
    unstagedChangesColor:
      - "#eb6f92"
    defaultFgColor:
      - "#e0def4"
    searchingActiveBorderColor:
      - "#f6c177"

  authorColors:
    "*": "#9ccfd8"

  showFileTree: true
  keybinding:
    universal:
      quit: q
