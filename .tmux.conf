#=============================================================================
# TERMINAL SETTINGS
#=============================================================================
# https://old.reddit.com/r/smux/comments/mesrci/tmux_2_doesnt_seem_to_use_256_colors/
set-option -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc,sitm=\E[3m,ritm=\E[23m'
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux*:extkeys' # Works when going over ssh from tmux
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

#=============================================================================
# GENERAL SETTINGS
#=============================================================================
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 3000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -ga update-environment " FZF_DEFAULT_OPTS"

set-option -g status-keys emacs
set-option -g allow-rename off
setw -g mode-keys vi

#=============================================================================
# KEY BINDINGS
#=============================================================================
# Set prefix key
unbind C-b
set -g prefix2 C-b
bind C-b send-prefix
# bind a send-prefix

set -g prefix C-Space
bind C-Space send-prefix
bind Space send-prefix

# Clipboard command (pbcopy on macOS, wl-copy on Wayland, xclip on X11)
if-shell "uname | grep -q Darwin" {
    set -g @clipboard "pbcopy"
} {
    if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" {
        set -g @clipboard "wl-copy"
    } {
        set -g @clipboard "xclip -selection clipboard"
    }
}

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "#{@clipboard}"
bind -T copy-mode-vi Escape send -X cancel

# Mouse scroll (3 lines per tick instead of default 5)
bind -n WheelUpPane if-shell -F -t= "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X -N 1 scroll-up' 'select-pane -t=; copy-mode -e; send-keys -X -N 1 scroll-up'"
bind -n WheelDownPane if-shell -F -t= "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X -N 1 scroll-down' 'select-pane -t='"

# Right-click to copy selection to clipboard
bind -n MouseDown3Pane if-shell -F "#{?pane_in_mode,1,0}" "send-keys -X copy-pipe-and-cancel '#{@clipboard}'" "send-keys -M"

# Utility bindings
bind c new-window -c "#{pane_current_path}"
unbind C
bind C new-window -c "#{session_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded! (clipboard: #{@clipboard})"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind o display-popup -E -w 80% -h 70% -d "#{pane_current_path}"
bind s display-popup -E "tmux list-sessions -F '#{session_activity} #{session_name} (#{session_windows}w) #{?session_attached,attached,detached} #{t:session_activity}' | grep -v \"^[0-9]* $(tmux display-message -p '#S') \" | sort -rn | sed 's/^[0-9]* //' | column -t | fzf --reverse | awk '{print \$1}' | xargs tmux switch-client -t"
bind S set-window-option synchronize-panes\; display-message "synchronize-panes: #{?pane_synchronized,ON,OFF}"
bind N display-popup -E -w 70% -h 70% kokoarch-tmux-session
bind Delete kill-session
bind-key E set -g extended-keys on \; display-message "extended-keys: on"
bind-key e set -g extended-keys off \; display-message "extended-keys: off"
bind-key u switch-client -T extkeys \; display-message "extkeys: 1=csi-u, 2=xterm, Esc=cancel"
bind-key -T extkeys 1 set -g extended-keys-format csi-u \; display-message "extended-keys-format: csi-u"
bind-key -T extkeys 2 set -g extended-keys-format xterm \; display-message "extended-keys-format: xterm"
bind-key -T extkeys Escape switch-client -T prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
# bind h split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# bind v split-window -v -c "#{pane_current_path}"

# Pane management
bind b break-pane
unbind p
bind p display-popup -E -w 70% -h 50% "tmux list-panes -F '#{pane_index} #{pane_current_command} #{pane_current_path}' | grep -v \"^$(tmux display-message -p '#P') \" | fzf --reverse --header 'Swap current pane with' | awk '{print \$1}' | xargs -I{} tmux swap-pane -t {}"
bind M display-popup -E -w 70% -h 50% "tmux list-panes -a -F '#{session_name}:#{window_index}.#{pane_index} [#{window_name}] #{pane_current_command} #{pane_current_path}' | awk -v cur=\"$(tmux display-message -p '#S')\" '{ if (index(\$0,cur\":\")==1) print \"0 \" \$0; else print \"1 \" \$0 }' | sort -n | cut -d' ' -f2- | grep -v \"$(tmux display-message -p '#S:#I.')\" | fzf --reverse --header 'Pull pane into current window' | awk '{print \$1}' | xargs -I{} tmux join-pane -s {}"
unbind m
bind m display-popup -E -w 70% -h 50% "tmux list-windows -a -F '#{session_name}:#{window_index} [#{window_name}] #{pane_current_command}' | awk -v cur=\"$(tmux display-message -p '#S')\" '{ if (index(\$0,cur\":\")==1) print \"0 \" \$0; else print \"1 \" \$0 }' | sort -n | cut -d' ' -f2- | grep -v \"$(tmux display-message -p '#S:#I ')\" | fzf --reverse --header 'Move current pane to window' | awk '{print \$1}' | xargs -I{} tmux join-pane -t {}"

# Pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# bind -n C-h select-pane -L
# bind -n C-j if-shell "ps -o comm= -t '#{pane_tty}' | grep -qE 'claude'" "send-keys C-j" "select-pane -D"
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Window navigation
bind -r Tab last-window
bind -n C-M-Tab last-window
bind -n C-M-w select-window -t :+
bind -n C-M-b select-window -t :-
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Pane resize
bind -n C-M-Left resize-pane -L 2
bind -n C-M-Right resize-pane -R 2
bind -n C-M-Up resize-pane -U 2
bind -n C-M-Down resize-pane -D 2

# Layout switching (rearranges existing panes only, no new panes created)
# Layout 1: Main left 60%, remaining panes stacked on right
bind -n M-1 set -w main-pane-width 50% \; select-layout main-vertical \; select-pane -t '{main-pane}'

# Layout 2: Main top 60%, remaining panes along bottom
bind -n M-2 set -w main-pane-height 50% \; select-layout main-horizontal \; select-pane -t '{main-pane}'

# Layout 3: Focus left 70%, remaining panes on right
bind -n M-3 set -w main-pane-width 70% \; select-layout main-vertical \; select-pane -t '{main-pane}'

# Layout 4: Focus top 70%, remaining panes on bottom
bind -n M-4 set -w main-pane-height 70% \; select-layout main-horizontal \; select-pane -t '{main-pane}'

# Layout 5: Three equal panes in a row
bind -n M-5 select-layout even-horizontal \; select-pane -t '{left}'

# Layout 6: Equal panes stacked top to bottom
bind -n M-6 select-layout even-vertical \; select-pane -t '{top}'

# Rotate panes in current layout
bind -n M-0 rotate-window -D \; select-pane -t '{main-pane}'

# Toggle outer tmux off (F12) for nested sessions (e.g. SSH)
# When off, all keys including prefix pass through to inner tmux
bind -T root F12 \
  set prefix None \;\
  set prefix2 None \;\
  set key-table off \;\
  set status-style "bg=default,fg=brightblack" \;\
  set status-left "#[fg=brightblack,bg=default] #S #[bg=default] " \;\
  set window-status-current-format "#[fg=brightblack] #I:#W " \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u prefix2 \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  set -u window-status-current-format \;\
  refresh-client -S

#=============================================================================
# THEME & STATUS BAR
#=============================================================================
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g window-status-separator ""

# Colors and styling
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=green,bold] #S #[bg=default] "
set -g status-right "#[fg=green]#{?client_prefix,PREFIX ,}#[fg=colour6]#{?pane_in_mode,COPY ,}#[fg=colour3]#{?#{==:#{client_key_table},extkeys},EXTKEYS ,}#[fg=brightblack]#h • #(cd #{pane_current_path}; git branch --show-current 2>/dev/null) "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=green,bold] #I:#W "
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour244"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=colour6,fg=black"
setw -g clock-mode-colour blue
